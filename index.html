<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css">
  <title>Quiz Bíblico</title>
  </head>
<body>

  <h1>📖 Quiz Bíblico</h1>

  <!-- TELA INICIAL -->
  <div id="start-screen">
    <h2>🎯 Bem-vindo ao Quiz!</h2>
    
    <!-- SELETOR DE CONJUNTO DE PERGUNTAS -->
    <div style="margin: 15px 0; padding: 15px; background: #f0f0f0; border-radius: 10px;">
      <label style="font-weight: bold;">📚 Escolha o conjunto de perguntas:</label>
      <div style="margin-top: 10px;">
        <button id="btn-original" style="margin: 5px; padding: 8px 15px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer;">📖 Conjunto Original</button>
        <button id="btn-new" style="margin: 5px; padding: 8px 15px; background: #8e44ad; color: white; border: none; border-radius: 5px; cursor: pointer;">🔥 Conjunto Super Difícil</button>
      </div>
      <p id="conjunto-info" style="margin-top: 10px; font-size: 14px; color: #555;">📚 Conjunto ativo: PERGUNTAS ORIGINAIS</p>
    </div>
    
    <input type="text" id="usuario" placeholder="Digite seu nome" />
    <br />
    <button id="start-btn">🚀 INICIAR QUIZ</button>
  </div>

  <!-- TELA DO QUIZ -->
  <div id="quiz-container" class="hidden">
    <div id="phase-info"></div>
    <div id="question"></div>
    <div id="answers"></div>
    <button id="next-btn" class="hidden">➡️ Próxima Pergunta</button>
    <button id="next-phase-btn" class="hidden">🎯 Avançar para a Próxima Fase</button>
    <div id="result" class="hidden"></div>
  </div>

  <div class="progresso">
    <button class="action" onclick="salvarProgresso()">💾 Salvar Progresso</button>
    <button class="action" onclick="consultarProgresso()">📊 Ver Progresso</button>
  </div>
  <div id="progresso-info" style="margin-top: 20px; font-size: 18px;"></div>
  </body>

  <script src="script.js"></script>

  <script>
     if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then((registration) => {
            console.log('Service Worker registrado com sucesso: ', registration);
          })
          .catch((error) => {
            console.log('Erro ao registrar o Service Worker: ', error);
          });
      });
    }
  </script>
<script>
  // ============================================
// DETECTOR DE SAÍDA IMEDIATA DO QUIZ
// ============================================

(function() {
    const WEBHOOK_URL = "https://script.google.com/macros/s/SEU_ID_AQUI/exec"; // ⚠️ COLOQUE SEU URL!
    let saidaJaRegistrada = false;
    let horarioInicio = Date.now();
    
    // Função principal para registrar saída
    function registrarSaida(motivo) {
        if (saidaJaRegistrada) return;
        
        const nome = localStorage.getItem("usuario") || sessionStorage.getItem("usuario") || "Anônimo";
        
        // Só registra se tiver nome (jogador começou o quiz)
        if (nome === "Anônimo") {
            console.log("⚠️ Visitante sem nome - não registrando saída");
            return;
        }
        
        saidaJaRegistrada = true;
        
        const dadosSaida = {
            tipo: "SAIU_DO_JOGO",
            nome: nome,
            motivo: motivo,
            fase_atual: typeof currentPhase !== 'undefined' ? currentPhase : 
                       localStorage.getItem("fase_atual") || 1,
            pontuacao_atual: typeof score !== 'undefined' ? score : 
                            localStorage.getItem("pontuacao") || 0,
            tempo_total: Math.floor((Date.now() - horarioInicio) / 1000),
            conjunto_ativo: typeof activeQuestionSet !== 'undefined' ? activeQuestionSet : 
                           localStorage.getItem("conjunto") || "original",
            url: window.location.href,
            navegador: navigator.userAgent,
            timestamp: Date.now()
        };
        
        console.log(`🚪 SAÍDA DETECTADA: ${nome} - Motivo: ${motivo}`);
        
        // MÉTODO 1: sendBeacon (mais confiável para fechamento)
        if (navigator.sendBeacon) {
            const blob = new Blob([JSON.stringify(dadosSaida)], {type: "application/json"});
            const enviado = navigator.sendBeacon(WEBHOOK_URL, blob);
            console.log(`📡 sendBeacon: ${enviado ? "enviado" : "falhou"}`);
        }
        
        // MÉTODO 2: fetch normal (fallback)
        fetch(WEBHOOK_URL, {
            method: "POST",
            mode: "no-cors",
            keepalive: true,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dadosSaida)
        }).catch(erro => console.log("Erro no fetch:", erro));
        
        // Armazenar localmente (backup)
        const saidasBackup = JSON.parse(localStorage.getItem("saidas_backup") || "[]");
        saidasBackup.push(dadosSaida);
        localStorage.setItem("saidas_backup", JSON.stringify(saidasBackup.slice(-50)));
    }
    
    // ============================================
    // EVENTOS QUE DETECTAM SAÍDA
    // ============================================
    
    // 1. Fechar aba ou recarregar página (MAIS IMPORTANTE)
    window.addEventListener("beforeunload", function() {
        registrarSaida("fechou_aba_ou_recarregou");
    });
    
    // 2. Página sendo descarregada
    window.addEventListener("pagehide", function() {
        registrarSaida("pagehide");
    });
    
    // 3. Unload da página
    window.addEventListener("unload", function() {
        registrarSaida("unload");
    });
    
    // 4. Aba ficou invisível (perdeu foco)
    let timeoutOculto;
    document.addEventListener("visibilitychange", function() {
        if (document.hidden) {
            console.log("👁️ Aba ficou oculta");
            // Se ficar oculta por mais de 5 segundos, considerar como saída potencial
            timeoutOculto = setTimeout(function() {
                if (document.hidden && !saidaJaRegistrada) {
                    registrarSaida("aba_oculta_prolongada");
                }
            }, 5000);
        } else {
            if (timeoutOculto) clearTimeout(timeoutOculto);
            console.log("👁️ Aba visível novamente");
            saidaJaRegistrada = false; // Reset se voltou
        }
    });
    
    // 5. App minimizado (mobile)
    window.addEventListener("blur", function() {
        console.log("📱 App perdeu foco");
        setTimeout(function() {
            if (document.hidden && !saidaJaRegistrada) {
                registrarSaida("app_minimizado");
            }
        }, 3000);
    });
    
    // 6. Para Android Chrome
    if (window.onpause !== undefined) {
        window.addEventListener("pause", function() {
            registrarSaida("app_pausado_android");
        });
    }
    
    // 7. Perdeu conexão com internet
    window.addEventListener("offline", function() {
        registrarSaida("perdeu_conexao");
    });
    
    // 8. Botão manual de saída (opcional)
    window.criarBotaoSaidaManual = function() {
        const botao = document.createElement("button");
        botao.textContent = "🚪 Sair do Quiz";
        botao.style.position = "fixed";
        botao.style.bottom = "10px";
        botao.style.right = "10px";
        botao.style.backgroundColor = "#FF5722";
        botao.style.color = "white";
        botao.style.border = "none";
        botao.style.padding = "10px 15px";
        botao.style.borderRadius = "5px";
        botao.style.cursor = "pointer";
        botao.style.zIndex = "9999";
        botao.style.fontSize = "14px";
        
        botao.onclick = function() {
            registrarSaida("botao_sair_manual");
            if (confirm("Tem certeza que deseja sair do quiz?")) {
                window.close();
                window.location.href = "about:blank";
            }
        };
        
        document.body.appendChild(botao);
    };
    
    // Resetar ao iniciar o quiz
    window.resetarDetectorSaida = function() {
        saidaJaRegistrada = false;
        horarioInicio = Date.now();
        console.log("🔄 Detector de saída resetado");
    };
    
    // Iniciar heartbeat (opcional - para saber que o jogador está ativo)
    let intervaloHeartbeat;
    function iniciarHeartbeat() {
        if (intervaloHeartbeat) clearInterval(intervaloHeartbeat);
        
        intervaloHeartbeat = setInterval(function() {
            const nome = localStorage.getItem("usuario");
            if (nome && nome !== "Anônimo" && !saidaJaRegistrada) {
                fetch(WEBHOOK_URL, {
                    method: "POST",
                    mode: "no-cors",
                    keepalive: true,
                    body: JSON.stringify({
                        tipo: "HEARTBEAT",
                        nome: nome,
                        fase_atual: typeof currentPhase !== 'undefined' ? currentPhase : 1,
                        pontuacao_atual: typeof score !== 'undefined' ? score : 0,
                        timestamp: Date.now()
                    })
                }).catch(e => console.log("Heartbeat error:", e));
            }
        }, 30000); // A cada 30 segundos
    }
    
    // Iniciar heartbeat automaticamente
    iniciarHeartbeat();
    
    // Expor funções globalmente
    window.detectorSaida = {
        registrar: registrarSaida,
        resetar: window.resetarDetectorSaida,
        criarBotao: window.criarBotaoSaidaManual
    };
    
    console.log("✅ Detector de saída imediata inicializado!");
})();

// Integrar com seu quiz existente
// Chame esta função quando o jogador começar o quiz
function iniciarMonitoramentoSaida(nomeJogador) {
    if (nomeJogador) {
        localStorage.setItem("usuario", nomeJogador);
        if (window.detectorSaida && window.detectorSaida.resetar) {
            window.detectorSaida.resetar();
        }
        console.log(`🎮 Monitoramento iniciado para: ${nomeJogador}`);
    }
}

// Se quiser o botão de saída manual, descomente:
// window.detectorSaida.criarBotao();
</script>
  
</html>
